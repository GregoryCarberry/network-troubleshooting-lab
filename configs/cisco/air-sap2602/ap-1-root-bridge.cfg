enable
configure terminal

hostname AP-1

!
! ---- SSID (infrastructure bridge only) ----
!
dot11 ssid network-bridge
 authentication open
 authentication key-management wpa version 2
 infrastructure-ssid
 wpa-psk ascii 0 labbridge123
!

!
! ---- 5 GHz radio (backhaul) ----
!
interface Dot11Radio1
 no ip address
 encryption mode ciphers aes-ccm
 ssid network-bridge
 station-role root bridge
 bridge-group 1
 no shutdown
!

!
! ---- Ethernet side ----
!
interface GigabitEthernet0
 no ip address
 bridge-group 1
 no shutdown
!

!
! ---- Bridge Virtual Interface ----
!
interface BVI1
 ip address dhcp
 no shutdown
!

end
write memory
